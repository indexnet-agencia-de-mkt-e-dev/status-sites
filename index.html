<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Indexnet — Status dos Sites</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f9;color:#1a1a2e;font-size:14px}
header{background:#1a1a2e;color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
header h1{font-size:1.2rem}
.hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hdr-right small{opacity:.6;font-size:.75rem}
button{padding:7px 16px;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600}
.btn-edit{background:#3b82f6;color:#fff}
.btn-save{background:#22c55e;color:#fff;display:none}
.btn-cancel{background:#6b7280;color:#fff;display:none}
.btn-token{background:#f59e0b;color:#fff}
.btn-logout{background:#ef4444;color:#fff;display:none}
.token-bar{background:#fef9c3;border-bottom:1px solid #fde68a;padding:10px 24px;font-size:.8rem;display:none;align-items:center;gap:8px}
.token-bar input{flex:1;max-width:420px;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:.8rem}
.cards{display:flex;gap:12px;padding:16px 24px;flex-wrap:wrap}
.card{background:#fff;border-radius:8px;padding:16px 20px;flex:1;min-width:130px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card .num{font-size:1.8rem;font-weight:700}
.card .lbl{font-size:.75rem;color:#666;margin-top:2px}
.card .bar{height:5px;background:#eee;border-radius:3px;margin-top:8px}
.card .bar-fill{height:5px;border-radius:3px;background:#22c55e}
.controls{padding:0 24px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.controls input,.controls select{padding:7px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:.8rem}
.controls input{width:260px}
.tbl-wrap{padding:0 24px 32px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
th{background:#1a1a2e;color:#fff;padding:10px 12px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
tr.done td:first-child{border-left:3px solid #22c55e}
tr.partial td:first-child{border-left:3px solid #f59e0b}
tr.none td:first-child{border-left:3px solid #ef4444}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.7rem;font-weight:600}
.ok{background:#dcfce7;color:#166534}.no{background:#fee2e2;color:#991b1b}
.srv{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.68rem;font-weight:600}
.hi{background:#dbeafe;color:#1e40af}.hg{background:#fef9c3;color:#854d0e}.ab{background:#f3e8ff;color:#6b21a8}
.status-sel,.resp-sel,.edit-input{padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:.78rem;background:#fff;width:100%}
.st-pend{color:#92400e;background:#fef3c7;border-color:#fde68a}
.st-prog{color:#1e40af;background:#dbeafe;border-color:#bfdbfe}
.st-done{color:#166534;background:#dcfce7;border-color:#86efac}
td.editable{background:#fffbeb}
td[contenteditable=true]{outline:2px solid #3b82f6;border-radius:2px;background:#eff6ff}
a{color:#2563eb;text-decoration:none}a:hover{text-decoration:underline}
footer{text-align:center;padding:20px;color:#999;font-size:.75rem}
.saving{opacity:.5;pointer-events:none}
#toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:8px;font-size:.85rem;display:none;z-index:999}
</style>
</head>
<body>
<header>
  <h1>Indexnet — Status dos Sites</h1>
  <div class="hdr-right">
    <small id="updated-at"></small>
    <button class="btn-edit" onclick="startEdit()">✏️ Editar</button>
    <button class="btn-save" onclick="saveData()">💾 Salvar</button>
    <button class="btn-cancel" onclick="cancelEdit()">✕ Cancelar</button>
    <button class="btn-logout" onclick="logout()">Sair</button>
    <button onclick="loadData()" style="background:#374151;color:#fff">↻ Atualizar</button>
  </div>
</header>

<div class="token-bar" id="token-bar">
  <span>Token GitHub:</span>
  <input type="password" id="token-input" placeholder="ghp_...">
  <button onclick="saveToken()" style="background:#22c55e;color:#fff">Salvar token</button>
  <small style="color:#92400e">O token fica salvo só no seu browser</small>
</div>

<div class="cards" id="cards"></div>

<div class="controls">
  <input type="text" id="search" placeholder="🔍 Filtrar cliente ou domínio..." oninput="filterRows()">
  <select id="fil-srv" onchange="filterRows()">
    <option value="">Todos os servidores</option>
    <option>Hostinger</option><option>Hostgator</option><option>Ambos</option>
  </select>
  <select id="fil-gh" onchange="filterRows()">
    <option value="">GitHub: todos</option>
    <option value="true">Com repo</option>
    <option value="false">Sem repo</option>
  </select>
  <select id="fil-cf" onchange="filterRows()">
    <option value="">Cloudflare: todos</option>
    <option value="ok">Ativo</option>
    <option value="no">Sem Cloudflare</option>
  </select>
  <select id="fil-status" onchange="filterRows()">
    <option value="">Status: todos</option>
    <option>Pendente</option><option>Em andamento</option><option>Concluído</option>
  </select>
</div>

<div class="tbl-wrap">
<table id="tbl">
<thead>
<tr>
  <th>#</th><th>Cliente</th><th>Domínio</th><th>Servidor</th>
  <th>GitHub</th><th>Cloudflare</th>
  <th>Plataforma</th><th>PHP</th><th>WP</th>
  <th>Responsável</th><th>Status GH</th><th>Status CF</th>
  <th>Prioridade</th><th>Observações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<footer id="footer">Indexnet · gerado por check_sites.py</footer>
<div id="toast"></div>

<script>
const ORG  = 'indexnet-agencia-de-mkt-e-dev';
const REPO = 'status-sites';
const RAW  = `https://raw.githubusercontent.com/${ORG}/${REPO}/main/data.json`;
const API  = `https://api.github.com/repos/${ORG}/${REPO}/contents/data.json`;

let DATA = null;
let editMode = false;

function toast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#166534' : '#991b1b';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

async function loadData() {
  try {
    const r = await fetch(RAW + '?t=' + Date.now());
    DATA = await r.json();
    renderCards(DATA.stats);
    renderTable(DATA.clients);
    document.getElementById('updated-at').textContent = 'Atualizado: ' + DATA.updated_at;
    document.getElementById('footer').textContent = 'Indexnet · gerado por check_sites.py · ' + DATA.updated_at;
  } catch(e) { toast('Erro ao carregar dados: ' + e.message, false); }
}

function renderCards(s) {
  if (!s) return;
  const pgh = s.total ? Math.round(s.github_sim/s.total*100) : 0;
  const pcf = s.total ? Math.round(s.cf_ativo/s.total*100) : 0;
  document.getElementById('cards').innerHTML = `
    <div class="card"><div class="num">${s.total}</div><div class="lbl">Total clientes</div></div>
    <div class="card"><div class="num">${s.github_sim}</div><div class="lbl">Com GitHub</div>
      <div class="bar"><div class="bar-fill" style="width:${pgh}%"></div></div></div>
    <div class="card"><div class="num">${s.github_nao}</div><div class="lbl">Sem GitHub</div></div>
    <div class="card"><div class="num">${s.cf_ativo}</div><div class="lbl">Com Cloudflare</div>
      <div class="bar"><div class="bar-fill" style="width:${pcf}%"></div></div></div>
    <div class="card"><div class="num">${s.cf_nao}</div><div class="lbl">Sem Cloudflare</div></div>`;
}

function statusClass(v) {
  if (v==='Concluído') return 'st-done';
  if (v==='Em andamento') return 'st-prog';
  return 'st-pend';
}

function renderTable(clients) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  clients.forEach((c, i) => {
    const ghOk = c.github === true;
    const cfOk = (c.cloudflare||'').startsWith('Ativ');
    const rowCls = ghOk && cfOk ? 'done' : (ghOk || cfOk ? 'partial' : 'none');
    const srvCls = c.servidor==='Hostgator' ? 'hg' : (c.servidor==='Hostinger' ? 'hi' : 'ab');
    const tr = document.createElement('tr');
    tr.className = rowCls;
    tr.dataset.idx = i;
    tr.innerHTML = `
      <td>${i+1}</td>
      <td><strong>${c.username}</strong></td>
      <td><a href="https://${c.domain}" target="_blank">${c.domain}</a></td>
      <td><span class="srv ${srvCls}">${c.servidor||'?'}</span></td>
      <td><span class="badge ${ghOk?'ok':'no'}">${ghOk?'✓':'✗'} GitHub</span></td>
      <td><span class="badge ${cfOk?'ok':'no'}">${cfOk?'✓':'✗'} CF</span></td>
      <td class="editable" data-field="_platform">${c._platform||''}</td>
      <td class="editable" data-field="_php_ver">${c._php_ver||''}</td>
      <td class="editable" data-field="_wp_ver">${c._wp_ver||''}</td>
      <td class="editable" data-field="_responsavel">
        <select class="resp-sel" data-field="_responsavel" onchange="markDirty(this)" disabled>
          <option value="">—</option>
          <option ${c._responsavel==='Dev 1'?'selected':''}>Dev 1</option>
          <option ${c._responsavel==='Dev 2'?'selected':''}>Dev 2</option>
          <option ${c._responsavel==='Concluído'?'selected':''}>Concluído</option>
        </select>
      </td>
      <td class="editable" data-field="_status_gh">
        <select class="status-sel ${statusClass(c._status_gh||'Pendente')}" data-field="_status_gh" onchange="markDirty(this);this.className='status-sel '+statusClass(this.value)" disabled>
          <option ${(c._status_gh||'Pendente')==='Pendente'?'selected':''}>Pendente</option>
          <option ${c._status_gh==='Em andamento'?'selected':''}>Em andamento</option>
          <option ${c._status_gh==='Concluído'?'selected':''}>Concluído</option>
        </select>
      </td>
      <td class="editable" data-field="_status_cf">
        <select class="status-sel ${statusClass(c._status_cf||'Pendente')}" data-field="_status_cf" onchange="markDirty(this);this.className='status-sel '+statusClass(this.value)" disabled>
          <option ${(c._status_cf||'Pendente')==='Pendente'?'selected':''}>Pendente</option>
          <option ${c._status_cf==='Em andamento'?'selected':''}>Em andamento</option>
          <option ${c._status_cf==='Concluído'?'selected':''}>Concluído</option>
        </select>
      </td>
      <td class="editable" data-field="_prioridade">${c._prioridade||''}</td>
      <td class="editable" data-field="_obs" style="white-space:normal;min-width:180px">${c._obs||''}</td>`;
    tbody.appendChild(tr);
  });
}

let dirty = false;
function markDirty(el) { dirty = true; }

function startEdit() {
  const token = localStorage.getItem('gh_token');
  if (!token) {
    document.getElementById('token-bar').style.display = 'flex';
    return;
  }
  enterEditMode();
}

function saveToken() {
  const v = document.getElementById('token-input').value.trim();
  if (!v) return;
  localStorage.setItem('gh_token', v);
  document.getElementById('token-bar').style.display = 'none';
  document.querySelector('.btn-logout').style.display = 'inline-block';
  enterEditMode();
  toast('Token salvo! Modo edição ativado.');
}

function logout() {
  localStorage.removeItem('gh_token');
  document.querySelector('.btn-logout').style.display = 'none';
  cancelEdit();
  toast('Token removido.');
}

function enterEditMode() {
  editMode = true;
  dirty = false;
  document.querySelector('.btn-edit').style.display = 'none';
  document.querySelector('.btn-save').style.display = 'inline-block';
  document.querySelector('.btn-cancel').style.display = 'inline-block';
  if (localStorage.getItem('gh_token')) document.querySelector('.btn-logout').style.display = 'inline-block';
  document.querySelectorAll('td.editable').forEach(td => {
    const sel = td.querySelector('select');
    if (sel) { sel.disabled = false; return; }
    td.contentEditable = 'true';
    td.addEventListener('input', () => dirty = true);
  });
  toast('Modo edição ativado. Edite as células e clique Salvar.');
}

function cancelEdit() {
  editMode = false;
  document.querySelector('.btn-edit').style.display = 'inline-block';
  document.querySelector('.btn-save').style.display = 'none';
  document.querySelector('.btn-cancel').style.display = 'none';
  renderTable(DATA.clients);
}

async function saveData() {
  const token = localStorage.getItem('gh_token');
  if (!token) { toast('Sem token. Clique em Editar primeiro.', false); return; }
  collectEdits();
  const body = document.querySelector('.tbl-wrap');
  body.classList.add('saving');
  try {
    const getResp = await fetch(API, { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } });
    const meta = await getResp.json();
    const sha = meta.sha;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(DATA, null, 2))));
    const putResp = await fetch(API, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'update manual ' + new Date().toLocaleString('pt-BR'), content, sha })
    });
    if (putResp.ok) {
      toast('Salvo com sucesso!');
      dirty = false;
      cancelEdit();
    } else {
      const err = await putResp.json();
      toast('Erro: ' + (err.message||putResp.status), false);
    }
  } catch(e) { toast('Erro ao salvar: ' + e.message, false); }
  body.classList.remove('saving');
}

function collectEdits() {
  document.querySelectorAll('#tbody tr').forEach(tr => {
    const idx = parseInt(tr.dataset.idx);
    if (isNaN(idx)) return;
    const c = DATA.clients[idx];
    tr.querySelectorAll('td.editable').forEach(td => {
      const field = td.dataset.field;
      const sel = td.querySelector('select');
      if (sel) { c[field] = sel.value; return; }
      c[field] = td.innerText.trim();
    });
  });
}

function filterRows() {
  const q  = document.getElementById('search').value.toLowerCase();
  const srv = document.getElementById('fil-srv').value;
  const gh  = document.getElementById('fil-gh').value;
  const cf  = document.getElementById('fil-cf').value;
  const st  = document.getElementById('fil-status').value;
  document.querySelectorAll('#tbody tr').forEach(tr => {
    const idx = parseInt(tr.dataset.idx);
    const c = DATA.clients[idx];
    let show = true;
    if (q && !tr.innerText.toLowerCase().includes(q)) show = false;
    if (srv && c.servidor !== srv) show = false;
    if (gh === 'true' && c.github !== true) show = false;
    if (gh === 'false' && c.github !== false) show = false;
    if (cf === 'ok' && !(c.cloudflare||'').startsWith('Ativ')) show = false;
    if (cf === 'no' && (c.cloudflare||'').startsWith('Ativ')) show = false;
    if (st && (c._status_gh !== st && c._status_cf !== st)) show = false;
    tr.style.display = show ? '' : 'none';
  });
}

// Avisa se sair com edições não salvas
window.addEventListener('beforeunload', e => { if (dirty) { e.preventDefault(); e.returnValue = ''; } });

// Verifica se já tem token salvo
if (localStorage.getItem('gh_token')) document.querySelector('.btn-logout').style.display = 'inline-block';

loadData();
</script>
</body>
</html>
